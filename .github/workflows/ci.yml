name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: List scaffold presets
        run: exam-materials-studio presets --out generated/scaffold-presets.md
      - name: Scaffold sample resource
        run: exam-materials-studio scaffold --preset primary --title "Primary Fractions Starter" --subject Mathematics --course Fractions --learning-objectives "Represent equivalent fractions with simple models" --curriculum-references "Local Grade 4 Fractions" --skills "fractions;equivalent fractions" --out generated/primary-fractions-starter.json
      - name: Validate sample resources
        run: exam-materials-studio validate examples/*.json examples/*.yaml examples/*.csv
      - name: Inventory sample coverage
        run: exam-materials-studio inventory examples/*.json examples/*.yaml examples/*.csv --out generated/inventory.md --csv generated/inventory.csv
      - name: Build sample packs
        run: exam-materials-studio build examples/*.json examples/*.yaml examples/*.csv --out generated
      - name: Check generated Markdown catalog
        run: test -s generated/index.md
      - name: Check generated JSON catalog
        run: test -s generated/index.json
