name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Validate sample resources
        run: exam-materials-studio validate examples/*.json examples/*.csv
      - name: Inventory sample coverage
        run: exam-materials-studio inventory examples/*.json examples/*.csv --out generated/inventory.md --csv generated/inventory.csv
      - name: Build sample packs
        run: exam-materials-studio build examples/*.json examples/*.csv --out generated
